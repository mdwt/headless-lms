# Local development services for headless-lms.
# Pinned project name so volumes stay `headless-lms_*` regardless of this file's
# directory (otherwise compose would derive the name from the `docker/` folder).
#
# Host ports live in the 8000 range to avoid conflicts; container-internal ports
# are unchanged. Run from the repo root:
#   docker compose -f docker/docker-compose.yml up -d     # start in the background
#   docker compose -f docker/docker-compose.yml down      # stop (keeps data)
#   docker compose -f docker/docker-compose.yml down -v   # stop and wipe data
#
# Postgres:  postgres://postgres:postgres@localhost:8005/headless_lms
name: headless-lms

services:
  postgres:
    image: postgres:17-alpine
    container_name: headless-lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: headless_lms
    ports:
      - "8005:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d headless_lms"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for uploads + content (private bucket, served
  # via presigned URLs). Matches the STORAGE_* defaults in .env.example.
  #   API:     http://localhost:8006
  #   Console: http://localhost:8007  (login minioadmin / minioadmin)
  minio:
    image: minio/minio:latest
    container_name: headless-lms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "8006:9000"
      - "8007:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
