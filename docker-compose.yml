# Local development Postgres for headless-lms.
# Matches the default DATABASE_URL in .env.example:
#   postgres://postgres:postgres@localhost:5432/headless_lms
#
# Usage:
#   docker compose up -d        # start in the background
#   docker compose down         # stop (keeps data)
#   docker compose down -v      # stop and wipe the data volume
services:
  postgres:
    image: postgres:17-alpine
    container_name: headless-lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: headless_lms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d headless_lms"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for uploads + content (private bucket, served
  # via presigned URLs). Matches the STORAGE_* defaults in .env.example.
  #   API:     http://localhost:9000
  #   Console: http://localhost:9001  (login minioadmin / minioadmin)
  minio:
    image: minio/minio:latest
    container_name: headless-lms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
