# Local development Postgres for headless-lms.
# Matches the default DATABASE_URL in .env.example:
#   postgres://postgres:postgres@localhost:5432/headless_lms
#
# Usage:
#   docker compose up -d        # start in the background
#   docker compose down         # stop (keeps data)
#   docker compose down -v      # stop and wipe the data volume
services:
  postgres:
    image: postgres:17-alpine
    container_name: headless-lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: headless_lms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d headless_lms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
